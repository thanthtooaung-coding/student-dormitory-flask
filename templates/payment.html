{% extends "base.html" %}
{% block content %}

<div class="payment-container">
    <div class="payment-header">
        <h1>Payment</h1>
        <p>Complete your booking payment</p>
    </div>

    <div class="payment-content">
        <div class="payment-summary">
            <h3>Booking Summary</h3>
            <div class="summary-card">
                <div class="summary-item">
                    <span>Hostel:</span>
                    <span>{{ booking.hostel_name }}</span>
                </div>
                <div class="summary-item">
                    <span>Room Type:</span>
                    <span>{{ booking.room_type }}</span>
                </div>
                <div class="summary-item">
                    <span>Check-in Date:</span>
                    <span>{{ booking.checkin_date }}</span>
                </div>
                <div class="summary-item total">
                    <span>Total Amount:</span>
                    <span class="price">฿{{ booking.price }}</span>
                </div>
            </div>
        </div>

        <form method="POST" class="payment-form">
            <h3>Payment Method</h3>
            <div class="payment-methods">
                <label class="payment-option">
                    <input type="radio" name="payment_method" value="promptpay" required>
                    <div class="option-content">
                        <span class="method-name">PromptPay</span>
                        <span class="method-desc">Pay via PromptPay QR Code</span>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment_method" value="credit_card" required>
                    <div class="option-content">
                        <span class="method-name">Credit Card</span>
                        <span class="method-desc">Visa, Mastercard, JCB</span>
                    </div>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment_method" value="bank_transfer" required>
                    <div class="option-content">
                        <span class="method-name">Bank Transfer</span>
                        <span class="method-desc">Direct bank transfer</span>
                    </div>
                </label>
            </div>

            <button type="submit" class="btn btn-pay">Complete Payment</button>
        </form>
    </div>
</div>

<style>
.payment-container {
    max-width: 1000px;
    margin: 2rem auto;
    padding: 0 2rem;
}

.payment-header {
    text-align: center;
    margin-bottom: 3rem;
}

.payment-content {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 2rem;
}

.payment-summary h3, .payment-form h3 {
    margin-bottom: 1.5rem;
    color: var(--primary-navy);
}

.summary-card {
    background: var(--light-gray);
    padding: 2rem;
    border-radius: 12px;
}

.summary-item {
    display: flex;
    justify-content: space-between;
    padding: 1rem 0;
    border-bottom: 1px solid var(--medium-gray);
}

.summary-item.total {
    border-top: 2px solid var(--accent-gold);
    border-bottom: none;
    margin-top: 1rem;
    padding-top: 1.5rem;
    font-weight: 700;
}

.payment-form {
    background: var(--white);
    padding: 2rem;
    border-radius: 16px;
    box-shadow: var(--shadow-md);
}

.payment-methods {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2rem;
}

.payment-option {
    display: flex;
    align-items: center;
    padding: 1.5rem;
    border: 2px solid var(--medium-gray);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.payment-option:hover {
    border-color: var(--accent-gold);
    background: rgba(244, 162, 97, 0.05);
}

.payment-option input[type="radio"] {
    margin-right: 1rem;
    width: 20px;
    height: 20px;
    cursor: pointer;
}

.option-content {
    display: flex;
    flex-direction: column;
    flex: 1;
}

.method-name {
    font-weight: 600;
    color: var(--primary-dark);
    margin-bottom: 0.25rem;
}

.method-desc {
    font-size: 0.9rem;
    color: var(--text-secondary);
}

.btn-pay {
    width: 100%;
    padding: 1.25rem;
    font-size: 1.1rem;
}

@media (max-width: 968px) {
    .payment-content {
        grid-template-columns: 1fr;
    }
}
</style>

{% endblock %}
